<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Lesson 13 Hillel</title>
    <style>
        table, table td {
            border: 1px solid #000;
            border-collapse: collapse;
        }
        table td {
            padding: 5px;
        }
    </style>
</head>
<body>
    <ul id="list"></ul>

    <script>
        let generateList = function(array) {
            const $list = document.getElementById('list');
            for(let i = 0; i < array.length; i++) {
                const $li = document.createElement('li');
                if(Array.isArray(array[i])) {
                    const $sublist = document.createElement('ul');
                    for(let j = 0; j < array[i].length; j++) {
                        const $subListItem = document.createElement('li');
                        $subListItem.textContent = array[i][j];
                        $sublist.append($subListItem);
                        $li.append($sublist);
                        $list.append($li);
                    }
                } else {
                    $li.textContent = array[i];
                    $list.append($li);
                }  
            }
        }

        generateList([1,2, [1.1,1.2,1.3] ,3]);

        let generateTable = function() {
            const $table = document.createElement('table');
            let num = 0;
            for(let i = 1; i <= 10; i++) {
                const $tr = document.createElement('tr');
                for(let j = 1; j <= 10; j++) {
                    const $td = document.createElement('td');
                    $td.textContent = ++num;
                    $tr.append($td);
                }
                $table.append($tr);
            }
            document.querySelector('body').insertBefore($table, document.querySelector('script'));
        }

        generateTable();
    </script>

</body>
</html>
